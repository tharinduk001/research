services:
  db:
    image: postgres:14-alpine
    container_name: postgres_container
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - project8_postgres_data:/var/lib/postgresql/data  
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  application:
    build: ./demo-application
    image: simply:latest
    container_name: demo_application_container
    ports:
      - 8000:8000
    environment:
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_PORT=${DB_PORT}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
      python manage.py makemigrations --noinput &&
      python manage.py migrate --noinput &&
      gunicorn simply.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 6 --timeout 30 --worker-class gthread
      "
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
    restart: unless-stopped


volumes:
  project8_postgres_data: